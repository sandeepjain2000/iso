<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO Compliance & Risk Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; color: #0f172a; }
        .btn-primary { display: inline-flex; align-items: center; justify-content: center; border-radius: 0.75rem; background-color: #171717; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500; color: white; transition: all 0.2s; cursor: pointer; border: none; }
        .btn-primary:hover { background-color: #262626; }
        .btn-secondary { display: inline-flex; align-items: center; justify-content: center; border-radius: 0.75rem; border: 1px solid #e5e5e5; background-color: white; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500; color: #171717; transition: all 0.2s; cursor: pointer; }
        .btn-secondary:hover { background-color: #f9fafb; }
        .btn-risk-nav { display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem; border-radius: 9999px; border: 1px solid #cbd5e1; background-color: white; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 600; color: #334155; transition: all 0.2s; cursor: pointer; }
        .btn-risk-nav:hover { background-color: #f8fafc; }
        .btn-risk-primary { display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem; border-radius: 9999px; background-color: #1e293b; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 600; color: white; transition: all 0.2s; cursor: pointer; border: none; }
        .btn-risk-primary:hover { background-color: #0f172a; }
        
        .cc-table-wrap { width: 100%; overflow-x: auto; border-radius: 1rem; border: 1px solid #e5e5e5; background: white; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.04); margin-bottom: 1.5rem; }
        .cc-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        .cc-table th, .cc-table td { border: 1px solid #e5e5e5; padding: 10px 14px; background: white; vertical-align: top; }
        .cc-table thead th { background: #f5f5f5; font-weight: 600; color: #3f3f46; position: sticky; top: 0; }
        .cc-table tbody tr:nth-child(even) td { background: #fafafa; }
        
        .risk-table-wrap { width: 100%; overflow-x: auto; border-radius: 0.5rem; border: 1px solid #e2e8f0; background: white; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
        .risk-table-theme .cc-table th, .risk-table-theme .cc-table td { border-color: #e2e8f0; }
        .risk-table-theme .cc-table thead th { background: #f8fafc; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #64748b; }
        .risk-table-theme .cc-table tbody tr:nth-child(even) td { background: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons placeholder
        const Icon = ({ name }) => <span className="inline-block w-4 h-4 opacity-70">[{name}]</span>;

        // Dummy Data
        const dummyRisks = [
            { doc: "ISO 27001", cat: "A.5 Information Security Policies", l1: "A.5.1 Management Direction", resImpact: "MODERATE", resLikelihood: "UNLIKELY", desc: "Lack of clear management direction might lead to unauthorized access." },
            { doc: "ISO 27001", cat: "A.6 Organization of InfoSec", l1: "A.6.1 Internal Organization", resImpact: "MINOR", resLikelihood: "POSSIBLE", desc: "Unclear roles could cause delayed incident response." },
            { doc: "ISO 27001", cat: "A.8 Asset Management", l1: "A.8.1 Responsibility for Assets", resImpact: "MAJOR", resLikelihood: "UNLIKELY", desc: "Unaccounted assets might be stolen or lost." }
        ];

        // --- COMPONENTS ---

        const AppShell = ({ children, currentPath, setPath }) => {
            const isRisk = currentPath.startsWith('/risk');
            const nav = [
                { href: "/overview", label: "Overview" },
                { href: "/assets", label: "Assets" },
                { href: "/risk", label: "Risk" },
                { href: "/compliance", label: "Document compliance" },
            ];

            return (
                <div className={`min-h-screen ${isRisk ? 'bg-slate-50' : 'bg-neutral-50'} antialiased pb-10`}>
                    <header className={`border-b ${isRisk ? 'border-slate-200 bg-white' : 'border-neutral-200 bg-white'}`}>
                        <div className="mx-auto max-w-[1200px] px-4 sm:px-6 py-5">
                            <div className="flex flex-col gap-5">
                                <div className="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
                                    <div>
                                        <p className="text-[11px] font-medium uppercase tracking-[0.12em] text-slate-500">Compliance for certification</p>
                                        <h1 className="mt-1 text-lg font-semibold tracking-tight text-slate-900 sm:text-xl">ISMS Scope, Risk & Evidence</h1>
                                        <p className="mt-2 text-xs text-slate-500"><span className="font-medium text-slate-800">Acme Corp Demo</span> · admin@acme.com</p>
                                    </div>
                                    <div className="flex flex-col items-end gap-2">
                                        <button className="btn-primary text-sm" onClick={() => setPath('/')}>Sign out</button>
                                    </div>
                                </div>
                                <nav className={`flex flex-wrap gap-1 rounded-lg border p-1 ${isRisk ? 'border-slate-200 bg-slate-100' : 'border-neutral-200 bg-neutral-100'}`}>
                                    {nav.map(item => {
                                        const active = currentPath.startsWith(item.href);
                                        const btnClass = isRisk
                                            ? `rounded-md px-3.5 py-2 text-sm font-medium transition ${active ? 'bg-sky-50 font-semibold text-sky-900 shadow-sm ring-1 ring-sky-200' : 'text-slate-600 hover:bg-white hover:text-slate-900'}`
                                            : `rounded-lg px-3.5 py-2 text-sm font-medium transition ${active ? 'bg-white text-neutral-950 shadow-sm ring-1 ring-neutral-200' : 'text-neutral-600 hover:bg-white hover:text-neutral-950'}`;
                                        
                                        return (
                                            <button key={item.href} onClick={() => setPath(item.href)} className={btnClass}>{item.label}</button>
                                        );
                                    })}
                                </nav>
                            </div>
                        </div>
                    </header>
                    <main className="mx-auto max-w-[1200px] px-4 py-8 sm:px-6">
                        {children}
                    </main>
                </div>
            );
        };

        const LandingPage = ({ setPath }) => (
            <div className="min-h-screen bg-neutral-50 py-12 px-4 sm:px-6">
                <div className="mx-auto max-w-md w-full rounded-3xl border border-neutral-200 bg-white p-8 shadow-sm">
                    <h2 className="text-xl font-semibold tracking-tight text-neutral-950">Sign in</h2>
                    <p className="mt-2 text-sm text-neutral-600">Access your ISMS Scope, Risk & Evidence portal.</p>
                    <form className="mt-6 space-y-5" onSubmit={(e) => { e.preventDefault(); setPath('/overview'); }}>
                        <label className="block text-xs font-medium text-neutral-700">Email
                            <input type="email" value="admin@acme.com" readOnly className="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none" />
                        </label>
                        <label className="block text-xs font-medium text-neutral-700">Password
                            <input type="password" value="password123" readOnly className="mt-1.5 w-full rounded-full border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none" />
                        </label>
                        <button type="submit" className="btn-primary w-full rounded-full py-2.5">Sign in</button>
                    </form>
                </div>
            </div>
        );

        const OverviewPage = () => (
            <div className="space-y-6">
                <div>
                    <h2 className="text-2xl font-semibold text-neutral-900">Overview</h2>
                    <p className="text-sm text-neutral-600 mt-1">Data below is scoped to your organisation only.</p>
                </div>
                
                <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
                    {[
                        { label: "Certification documents", value: "3", note: "2 marked in scope" },
                        { label: "Level-2 control points", value: "114", note: "Leaf nodes in tree" },
                        { label: "Evidence records", value: "42", note: "Attached to controls" },
                        { label: "Assets registered", value: "18", note: "Inventory rows" }
                    ].map(s => (
                        <div key={s.label} className="rounded-xl border border-neutral-200 bg-white p-5 shadow-sm">
                            <p className="text-xs font-semibold uppercase text-neutral-500">{s.label}</p>
                            <p className="mt-2 text-3xl font-bold text-neutral-900">{s.value}</p>
                            <p className="mt-1 text-xs text-neutral-500">{s.note}</p>
                        </div>
                    ))}
                </div>
                
                <div className="cc-table-wrap p-5">
                    <h3 className="text-sm font-semibold mb-3 text-neutral-800">Application Overview</h3>
                    <p className="text-sm text-neutral-600 leading-relaxed">
                        This workspace mirrors your Excel-driven hierarchy: each certification objective is a <strong>document</strong>, broken into <strong>category</strong>, <strong>level 1</strong>, and <strong>level 2</strong>. Risk ratings sit at level 1; evidence at level 2. Scope checkboxes exclude branches from the auditor view.
                    </p>
                </div>
            </div>
        );

        const RiskDashboard = ({ setPath }) => (
            <div className="space-y-6">
                <div className="flex flex-wrap justify-between items-start gap-4">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800">Risk dashboard</h2>
                        <p className="text-sm text-slate-600 mt-1 max-w-2xl">In-scope level-1 controls across all certification documents: counts, residual/inherent distributions, and coverage of risk descriptions.</p>
                    </div>
                    <div className="flex flex-wrap gap-2">
                        <button className="btn-risk-primary" onClick={() => setPath('/risk/register')}>Risk Assessment Register</button>
                        <button className="btn-risk-nav" onClick={() => setPath('/risk/scope')}>In-scope / excluded</button>
                        <button className="btn-risk-nav">CSV Download</button>
                    </div>
                </div>

                <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
                    {[
                        { label: "Level-1 risks (in scope)", value: "35", hint: "Across every in-scope doc." },
                        { label: "With risk description", value: "30", hint: "Non-empty narrative." },
                        { label: "Missing description", value: "5", hint: "Still need a written risk." },
                        { label: "Certification documents", value: "2", hint: "With at least one in-scope L1." }
                    ].map(s => (
                        <div key={s.label} className="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                            <p className="text-xs font-semibold uppercase tracking-wide text-slate-500">{s.label}</p>
                            <p className="mt-2 text-3xl font-bold tracking-tight text-slate-800">{s.value}</p>
                            <p className="mt-1 text-xs text-slate-600">{s.hint}</p>
                        </div>
                    ))}
                </div>

                <div className="rounded-lg border border-slate-200 bg-white p-5 shadow-sm risk-table-theme">
                    <h3 className="text-sm font-semibold text-slate-800 mb-4">Sample rows</h3>
                    <div className="risk-table-wrap">
                        <table className="cc-table">
                            <thead>
                                <tr>
                                    <th>Document</th>
                                    <th>Category</th>
                                    <th>Level 1</th>
                                    <th>Residual impact</th>
                                    <th>Residual likelihood</th>
                                </tr>
                            </thead>
                            <tbody>
                                {dummyRisks.map((r, i) => (
                                    <tr key={i}>
                                        <td>{r.doc}</td>
                                        <td>{r.cat}</td>
                                        <td className="font-medium">{r.l1}</td>
                                        <td>{r.resImpact}</td>
                                        <td>{r.resLikelihood}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );

        const RiskRegister = ({ setPath }) => (
            <div className="space-y-6">
                <div className="flex flex-wrap justify-between items-start gap-4">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800">Risk assessment</h2>
                        <p className="text-sm text-slate-600 mt-1 max-w-2xl">Select a certification document, describe each level-1 risk, and set likelihood and impact.</p>
                    </div>
                    <div className="flex gap-2">
                        <button className="btn-risk-nav" onClick={() => setPath('/risk')}>Dashboard</button>
                        <button className="btn-risk-primary" onClick={() => alert("Saved!")}>Save risk</button>
                    </div>
                </div>

                <div className="rounded-lg border border-slate-200 bg-white p-4 shadow-sm mb-4">
                    <div className="flex items-center gap-4 text-sm">
                        <span className="font-medium text-slate-700">Document:</span>
                        <select className="rounded-md border border-slate-300 px-3 py-1.5 outline-none bg-white">
                            <option>ISO 27001</option>
                            <option>SOC 2</option>
                        </select>
                        <label className="flex items-center gap-2 ml-4">
                            <input type="checkbox" defaultChecked />
                            <span className="text-slate-600">Show only in-scope</span>
                        </label>
                    </div>
                </div>

                <div className="risk-table-theme risk-table-wrap">
                    <table className="cc-table">
                        <thead>
                            <tr>
                                <th>Category / Level 1</th>
                                <th>Risk Description</th>
                                <th>Inherent L / I</th>
                                <th>Residual L / I</th>
                            </tr>
                        </thead>
                        <tbody>
                            {dummyRisks.map((r, i) => (
                                <tr key={i}>
                                    <td className="min-w-[12rem]">
                                        <div className="text-xs text-slate-500 mb-1">{r.cat}</div>
                                        <div className="font-medium text-slate-900">{r.l1}</div>
                                    </td>
                                    <td>
                                        <textarea className="w-full min-h-[4rem] rounded-md border border-slate-300 p-2 text-xs outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" defaultValue={r.desc}></textarea>
                                    </td>
                                    <td>
                                        <div className="flex flex-col gap-2">
                                            <select className="rounded-md border border-slate-300 text-xs p-1" defaultValue="POSSIBLE">
                                                <option>RARE</option><option>UNLIKELY</option><option>POSSIBLE</option><option>LIKELY</option>
                                            </select>
                                            <select className="rounded-md border border-slate-300 text-xs p-1" defaultValue="MODERATE">
                                                <option>MINOR</option><option>MODERATE</option><option>MAJOR</option><option>CATASTROPHIC</option>
                                            </select>
                                        </div>
                                    </td>
                                    <td>
                                        <div className="flex flex-col gap-2">
                                            <select className="rounded-md border border-slate-300 text-xs p-1" defaultValue={r.resLikelihood}>
                                                <option>RARE</option><option>UNLIKELY</option><option>POSSIBLE</option><option>LIKELY</option>
                                            </select>
                                            <select className="rounded-md border border-slate-300 text-xs p-1" defaultValue={r.resImpact}>
                                                <option>MINOR</option><option>MODERATE</option><option>MAJOR</option><option>CATASTROPHIC</option>
                                            </select>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const ScopePage = ({ setPath, type }) => (
            <div className="space-y-6">
                <div className="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <button onClick={() => setPath(type === 'risk' ? '/risk' : '/compliance')} className="text-sm font-semibold text-slate-600 hover:text-slate-900">&larr; Back to {type}</button>
                    <h2 className="text-2xl font-bold text-slate-800 mt-4 capitalize">{type} — in-scope / excluded</h2>
                    <p className="text-sm text-slate-600 mt-1">Mark categories and levels as in scope or excluded.</p>
                </div>
                
                <div className="risk-table-theme risk-table-wrap">
                    <table className="cc-table">
                        <thead>
                            <tr>
                                <th>Category</th>
                                <th>Level 1</th>
                                <th>Level 2</th>
                                <th className="text-center">Cat In Scope</th>
                                <th className="text-center">L1 In Scope</th>
                                <th className="text-center">L2 In Scope</th>
                            </tr>
                        </thead>
                        <tbody>
                            {dummyRisks.map((r, i) => (
                                <tr key={i}>
                                    <td className="font-medium">{r.cat}</td>
                                    <td>{r.l1}</td>
                                    <td>{r.l1.replace('.1', '.1.1')} Leaf Node</td>
                                    <td className="text-center"><input type="checkbox" defaultChecked /></td>
                                    <td className="text-center"><input type="checkbox" defaultChecked /></td>
                                    <td className="text-center"><input type="checkbox" defaultChecked /></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const CompliancePage = ({ setPath }) => (
            <div className="space-y-6">
                <div className="flex flex-wrap justify-between items-start gap-4">
                    <div>
                        <h2 className="text-2xl font-bold text-neutral-900">Document compliance</h2>
                        <p className="text-sm text-neutral-600 mt-1 max-w-2xl">Review control guidance per level 2 and open Evidence for titles and references.</p>
                    </div>
                    <div>
                        <button className="btn-secondary" onClick={() => setPath('/compliance/scope')}>In-scope / excluded</button>
                    </div>
                </div>

                <div className="cc-table-wrap">
                    <table className="cc-table">
                        <thead>
                            <tr>
                                <th>Category</th>
                                <th>Level 1</th>
                                <th>Level 2</th>
                                <th>Control / guidance</th>
                                <th className="text-center">Evidence</th>
                            </tr>
                        </thead>
                        <tbody>
                            {dummyRisks.map((r, i) => (
                                <tr key={i}>
                                    <td className="font-medium text-neutral-900">{r.cat}</td>
                                    <td className="text-neutral-800">{r.l1}</td>
                                    <td className="text-neutral-800">{r.l1.replace('.1', '.1.1')} Action item</td>
                                    <td className="text-xs text-neutral-600 max-w-md">Management shall set clear direction in accordance with business requirements.</td>
                                    <td className="text-center align-middle">
                                        <button className="rounded-lg border border-neutral-200 bg-neutral-50 px-3 py-1.5 text-xs font-medium text-neutral-900 shadow-sm hover:bg-neutral-100">Evidence</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const AssetsPage = ({ setPath }) => {
            const [showImport, setShowImport] = useState(false);
            const [showAdd, setShowAdd] = useState(false);

            return (
            <div className="space-y-6">
                <div className="flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-neutral-200/80 bg-white px-4 py-3 shadow-[0_1px_2px_0_rgb(0_0_0_/_0.04)]">
                    <h2 className="text-base font-semibold tracking-tight text-neutral-950">Asset register</h2>
                    <div className="flex flex-wrap items-center gap-2">
                        <button className="btn-secondary" onClick={() => setShowImport(true)}>Import CSV</button>
                        <button className="btn-primary" style={{ backgroundColor: '#2563eb', color: 'white' }} onClick={() => setShowAdd(true)}>Add asset</button>
                    </div>
                </div>

                <div className="overflow-hidden rounded-2xl border border-neutral-200/80 bg-white shadow-[0_1px_2px_0_rgb(0_0_0_/_0.04)]">
                    <div className="overflow-x-auto">
                        <table className="w-full min-w-[52rem] border-collapse text-left text-sm cc-table">
                            <thead>
                                <tr className="border-b border-neutral-200 bg-neutral-50 text-xs font-semibold uppercase tracking-wide text-neutral-600">
                                    <th className="px-3 py-2.5">Asset ID</th>
                                    <th className="px-3 py-2.5">Name</th>
                                    <th className="px-3 py-2.5">Type</th>
                                    <th className="px-3 py-2.5">Location</th>
                                    <th className="px-3 py-2.5">Owner</th>
                                    <th className="px-3 py-2.5">Risk</th>
                                    <th className="px-3 py-2.5 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {[
                                    { id: "AST-17092301", name: "Production Database Server", type: "Hardware", loc: "AWS us-east-1", owner: "Jane Doe", risk: "HIGH" },
                                    { id: "AST-17092302", name: "Customer Data Backup", type: "Information", loc: "S3 Bucket", owner: "John Smith", risk: "MEDIUM" },
                                    { id: "AST-17092303", name: "Authentication Service", type: "Software", loc: "Kubernetes Cluster", owner: "Security Team", risk: "VERY_HIGH" }
                                ].map((a, i) => (
                                    <tr key={i} className={`border-b border-neutral-100 ${i % 2 === 0 ? 'bg-white' : 'bg-neutral-50/70'}`}>
                                        <td className="px-3 py-2 font-mono text-xs text-neutral-900">{a.id}</td>
                                        <td className="px-3 py-2 font-medium text-neutral-900">{a.name}</td>
                                        <td className="px-3 py-2 text-neutral-700">{a.type}</td>
                                        <td className="px-3 py-2 text-neutral-600">{a.loc}</td>
                                        <td className="px-3 py-2 text-neutral-600">{a.owner}</td>
                                        <td className="px-3 py-2">
                                            <span className={`inline-flex rounded-full border px-2.5 py-0.5 text-xs font-semibold uppercase tracking-wide ${a.risk === 'HIGH' || a.risk === 'VERY_HIGH' ? 'bg-orange-50 text-orange-900 border-orange-200' : 'bg-amber-50 text-amber-900 border-amber-200'}`}>
                                                {a.risk.replace('_', ' ')}
                                            </span>
                                        </td>
                                        <td className="px-3 py-2 text-right">
                                            <button className="text-neutral-500 hover:text-neutral-900 mr-2" onClick={() => setShowAdd(true)}>[View]</button>
                                            <button className="text-neutral-500 hover:text-neutral-900 mr-2" onClick={() => setShowAdd(true)}>[Edit]</button>
                                            <button className="text-red-500 hover:text-red-900">[Del]</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>

                {showImport && (
                    <div className="fixed inset-0 z-[85] flex items-start justify-center overflow-y-auto bg-black/35 p-4 pt-[8vh] backdrop-blur-[1px]">
                        <div className="relative w-full max-w-2xl rounded-2xl border border-neutral-200 bg-white p-4 shadow-xl sm:p-5">
                            <div className="mb-4 flex items-center justify-between gap-2">
                                <h3 className="text-base font-semibold text-neutral-950">Import assets (CSV)</h3>
                                <button className="btn-secondary text-xs px-3 py-1.5" onClick={() => setShowImport(false)}>Close</button>
                            </div>
                            <div className="rounded-lg border border-neutral-200 bg-neutral-50 p-6 text-center">
                                <p className="text-sm text-neutral-600 mb-4">Select a CSV file to import assets. Make sure it matches the required format.</p>
                                <button className="btn-primary" onClick={() => setShowImport(false)}>Select File & Import</button>
                            </div>
                        </div>
                    </div>
                )}

                {showAdd && (
                    <div className="fixed inset-0 z-[90] flex flex-col bg-black/40 p-2 backdrop-blur-[1px] sm:p-4">
                        <div className="mx-auto flex h-full max-h-[100dvh] w-full max-w-3xl flex-col overflow-hidden rounded-2xl border border-neutral-200 bg-white shadow-2xl">
                            <div className="flex shrink-0 items-center justify-between border-b border-neutral-100 px-4 py-3">
                                <h2 className="text-base font-semibold text-neutral-950">Add/Edit asset</h2>
                                <div className="flex gap-2">
                                    <button className="btn-primary" onClick={() => setShowAdd(false)}>Save asset</button>
                                    <button className="btn-secondary" onClick={() => setShowAdd(false)}>Close</button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-6">
                                <div className="space-y-4">
                                    <h3 className="text-base font-semibold text-neutral-900">Basic Information</h3>
                                    <div className="grid gap-4 sm:grid-cols-2">
                                        <div className="flex flex-col gap-1.5">
                                            <label className="text-sm text-neutral-700">Asset ID *</label>
                                            <input className="w-full rounded-xl border border-neutral-200 px-3 py-2 text-sm outline-none" defaultValue="AST-17092304" />
                                        </div>
                                        <div className="flex flex-col gap-1.5">
                                            <label className="text-sm text-neutral-700">Asset Name *</label>
                                            <input className="w-full rounded-xl border border-neutral-200 px-3 py-2 text-sm outline-none" placeholder="New asset" />
                                        </div>
                                        <div className="flex flex-col gap-1.5">
                                            <label className="text-sm text-neutral-700">Asset Type *</label>
                                            <select className="w-full rounded-xl border border-neutral-200 px-3 py-2 text-sm outline-none bg-white">
                                                <option>Hardware</option><option>Software</option><option>Information</option>
                                            </select>
                                        </div>
                                        <div className="flex flex-col gap-1.5">
                                            <label className="text-sm text-neutral-700">Owner *</label>
                                            <input className="w-full rounded-xl border border-neutral-200 px-3 py-2 text-sm outline-none" placeholder="Asset owner name" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </div>
            );
        };

        const App = () => {
            const [path, setPath] = useState('/');
            
            if (path === '/') return <LandingPage setPath={setPath} />;

            let Content;
            if (path === '/overview') Content = <OverviewPage />;
            else if (path === '/assets') Content = <AssetsPage setPath={setPath} />;
            else if (path === '/risk') Content = <RiskDashboard setPath={setPath} />;
            else if (path === '/risk/register') Content = <RiskRegister setPath={setPath} />;
            else if (path === '/risk/scope') Content = <ScopePage type="risk" setPath={setPath} />;
            else if (path === '/compliance') Content = <CompliancePage setPath={setPath} />;
            else if (path === '/compliance/scope') Content = <ScopePage type="compliance" setPath={setPath} />;
            
            return (
                <AppShell currentPath={path} setPath={setPath}>
                    {Content}
                </AppShell>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
